<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1117">
  <title>Peggle Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/visual-layout.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <button id="menuBtn" class="header-btn" title="Menu">☰</button>
      <h1 id="levelTitle" class="level-title">Level 1</h1>
      <button id="playBtn" class="header-btn" title="Play Level">▶</button>
    </header>

    <!-- Canvas -->
    <div id="canvasContainer" class="canvas-container">
      <canvas id="gameCanvas"></canvas>
      <!-- Survival settings side panel -->
      <div id="survivalPanel" class="survival-panel">
        <div class="survival-panel-title">Survival</div>
        <label class="survival-toggle-row">
          <span>Enable Vertical Mode</span>
          <input type="checkbox" id="survivalModeToggle">
        </label>
        <div id="survivalControls" class="survival-controls hidden">
          <div class="survival-control">
            <label for="survivalHeightSlider">Vertical Length</label>
            <div class="survival-control-row">
              <input type="range" id="survivalHeightSlider" min="400" max="24000" step="1">
              <input type="number" id="survivalHeightInput" min="400" max="24000" step="1">
            </div>
          </div>
          <div class="survival-control">
            <label for="survivalSpeedSlider">Move Speed</label>
            <div class="survival-control-row">
              <input type="range" id="survivalSpeedSlider" min="2" max="400" step="1">
              <input type="number" id="survivalSpeedInput" min="2" max="400" step="1">
            </div>
          </div>
          <div class="survival-control">
            <label for="survivalLoseLineSlider">Lose Line</label>
            <div class="survival-control-row">
              <input type="range" id="survivalLoseLineSlider" min="8" step="1">
              <input type="number" id="survivalLoseLineInput" min="8" step="1">
            </div>
          </div>
          <div class="survival-hint">Hold Shift for 5-step snapping</div>
        </div>
      </div>
      <!-- Animation side panel (inside canvas-container so canvas stays visible) -->
      <div id="animPanel" class="anim-panel">
        <div class="anim-panel-title">Animate <button id="closeAnimPanel" class="anim-close-btn">✕</button></div>
        <div class="anim-panel-body">
          <div class="anim-slider">
            <label>Duration <input type="number" id="animDurationInput" class="anim-num" value="2.0" step="0.1" min="0.5" max="8.0">s</label>
            <input type="range" id="animDurationSlider" min="5" max="80" value="20">
          </div>
          <div class="anim-slider">
            <label>X <input type="number" id="animDxInput" class="anim-num" value="0" step="1" min="-800" max="800">px</label>
            <input type="range" id="animDxSlider" min="-800" max="800" value="0">
          </div>
          <div class="anim-slider">
            <label>Y <input type="number" id="animDyInput" class="anim-num" value="0" step="1" min="-800" max="800">px</label>
            <input type="range" id="animDySlider" min="-800" max="800" value="0">
          </div>
          <div class="anim-slider">
            <label>Rot <input type="number" id="animRotInput" class="anim-num" value="0" step="1" min="-360" max="360">°</label>
            <input type="range" id="animRotSlider" min="-360" max="360" value="0">
          </div>
          <label class="anim-toggle"><input type="checkbox" id="animEasingToggle" checked> Ease</label>
          <button id="animInverseBtn" class="anim-btn anim-btn-toggle" type="button">Inverse: OFF</button>
          <button id="animCycleBtn" class="anim-btn anim-btn-toggle" type="button">Cycle: OFF</button>
          <label class="anim-toggle"><input type="checkbox" id="animHitTriggerToggle"> On Hit</label>
          <div id="animHitModeRow" class="anim-hit-mode-row" style="display:none">
            <button id="animHitCycleBtn" class="anim-btn anim-btn-toggle anim-btn-sm active" type="button">Loop</button>
            <button id="animHitSingleBtn" class="anim-btn anim-btn-toggle anim-btn-sm" type="button">Single</button>
            <button id="animHitSpinBtn" class="anim-btn anim-btn-toggle anim-btn-sm" type="button">Spin</button>
          </div>
          <div id="animHitStepsRow" class="anim-hit-mode-row" style="display:none">
            <label class="anim-steps-label">Steps</label>
            <input type="number" id="animHitStepsInput" class="anim-number-input" min="1" max="36" step="1" value="1">
          </div>
          <div class="anim-hint">Hold Shift to snap (5px, 5°, 0.5s)</div>
          <div class="anim-buttons">
            <button id="animPreviewBtn" class="anim-btn">Preview</button>
            <button id="animClearBtn" class="anim-btn">Clear</button>
            <button id="animApplyBtn" class="anim-btn primary">Apply</button>
          </div>
        </div>
      </div>
      <!-- Bumper properties panel (right side) -->
      <div id="bumperPanel" class="bumper-panel">
        <div class="bumper-panel-title">Bumper <button id="closeBumperPanel" class="anim-close-btn">✕</button></div>
        <div class="bumper-panel-body">
          <div class="anim-slider">
            <label>Bounce <input type="number" id="bumperBounceInput" class="anim-num" value="2.0" step="0.1" min="0.5" max="7.0"></label>
            <input type="range" id="bumperBounceSlider" min="5" max="70" value="20">
          </div>
          <div class="anim-slider">
            <label>Scale <input type="number" id="bumperScaleInput" class="anim-num" value="1.0" step="0.1" min="0.5" max="7.0"></label>
            <input type="range" id="bumperScaleSlider" min="5" max="70" value="10">
          </div>
          <label class="anim-toggle"><input type="checkbox" id="bumperDisappearToggle"> Disappear on hit</label>
          <label class="anim-toggle"><input type="checkbox" id="bumperOrangeToggle"> Count as orange</label>
        </div>
      </div>
      <!-- Flipper properties panel (right side) -->
      <div id="flipperPanel" class="bumper-panel">
        <div class="bumper-panel-title">Flippers <button id="closeFlipperPanel" class="anim-close-btn">✕</button></div>
        <div class="bumper-panel-body">
          <div class="anim-slider">
            <label>Length <input type="number" id="flipperLengthInput" class="anim-num" value="60" step="1" min="20" max="150"></label>
            <input type="range" id="flipperLengthSlider" min="20" max="150" value="60">
          </div>
          <div class="anim-slider">
            <label>Spread <input type="number" id="flipperOffsetInput" class="anim-num" value="196" step="1" min="10" max="250"></label>
            <input type="range" id="flipperOffsetSlider" min="10" max="250" value="196">
          </div>
          <div class="anim-slider">
            <label>Rest ° <input type="number" id="flipperRestInput" class="anim-num" value="23" step="1" min="5" max="60"></label>
            <input type="range" id="flipperRestSlider" min="5" max="60" value="23">
          </div>
          <div class="anim-slider">
            <label>Flip ° <input type="number" id="flipperFlipInput" class="anim-num" value="30" step="1" min="0" max="70"></label>
            <input type="range" id="flipperFlipSlider" min="0" max="70" value="30">
          </div>
          <div class="anim-slider">
            <label>Bounce <input type="number" id="flipperBounceInput" class="anim-num" value="0.65" step="0.05" min="0.3" max="5.0"></label>
            <input type="range" id="flipperBounceSlider" min="0.3" max="5.0" step="0.05" value="0.65">
          </div>
          <div class="anim-slider">
            <label>Width <input type="number" id="flipperWidthInput" class="anim-num" value="8" step="1" min="4" max="40"></label>
            <input type="range" id="flipperWidthSlider" min="4" max="40" value="8">
          </div>
          <div class="anim-slider">
            <label>Scale <input type="number" id="flipperScaleInput" class="anim-num" value="1.8" step="0.1" min="0.5" max="3.0"></label>
            <input type="range" id="flipperScaleSlider" min="5" max="30" value="18">
          </div>
        </div>
      </div>
      <!-- Portal properties panel (right side) -->
      <div id="portalPanel" class="bumper-panel">
        <div class="bumper-panel-title">Portal <button id="closePortalPanel" class="anim-close-btn">✕</button></div>
        <div class="bumper-panel-body">
          <div class="anim-slider">
            <label>Scale <input type="number" id="portalScaleInput" class="anim-num" value="1.0" step="0.1" min="0.5" max="5.0"></label>
            <input type="range" id="portalScaleSlider" min="5" max="50" value="10">
          </div>
          <label class="anim-toggle"><input type="checkbox" id="portalOneWayToggle"> One-sided (back side collides)</label>
          <label class="anim-toggle"><input type="checkbox" id="portalOneWayFlipToggle"> Invert one-sided direction</label>
        </div>
      </div>
      <!-- Multiball properties panel (right side) -->
      <div id="multiballPanel" class="bumper-panel">
        <div class="bumper-panel-title">Multiball <button id="closeMultiballPanel" class="anim-close-btn">✕</button></div>
        <div class="bumper-panel-body">
          <div class="anim-slider">
            <label>Extra Balls <input type="number" id="multiballCountInput" class="anim-num" value="1" step="1" min="1" max="10"></label>
            <input type="range" id="multiballCountSlider" min="1" max="10" value="1" step="1">
          </div>
        </div>
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <span id="pegCount">Pegs: 0</span>
      <span id="selectionCount"></span>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-group">
        <div class="peg-buttons">
          <button class="peg-btn" data-type="orange" title="Orange (Must Hit)"></button>
          <button class="peg-btn active" data-type="blue" title="Blue (Normal)"></button>
          <button class="peg-btn" data-type="green" title="Green (Special)"></button>
          <button class="peg-btn" data-type="purple" title="Purple (Bonus)"></button>
          <button class="peg-btn" data-type="multi" title="Multiball"></button>
          <button class="peg-btn" data-type="obstacle" title="Obstacle (Stays)"></button>
          <button class="peg-btn" data-type="bumper" title="Bumper (Bouncy)"></button>
          <button class="peg-btn" data-type="portalBlue" title="Portal Blue"></button>
          <button class="peg-btn" data-type="portalOrange" title="Portal Orange"></button>
        </div>
        <div class="shape-buttons">
          <button class="shape-btn active" data-shape="circle" title="Circle">●</button>
          <button class="shape-btn" data-shape="brick" title="Brick">▬</button>
        </div>
      </div>
      <div class="tool-buttons">
        <button id="undoBtn" class="tool-btn" title="Undo">↶</button>
        <button id="redoBtn" class="tool-btn" title="Redo">↷</button>
        <button id="gridBtn" class="tool-btn active" title="Grid">⊞</button>
        <button id="magnetBtn" class="tool-btn" title="Magnet Snap (S)">🧲</button>
        <button id="selectBtn" class="tool-btn" title="Select Mode">◻</button>
        <button id="drawBtn" class="tool-btn" title="Draw Curves (D)">✏</button>
        <button id="animateBtn" class="tool-btn" title="Animate (A)">~</button>
        <button id="flipperBtn" class="tool-btn" title="Flippers (F)">⌐⌐</button>
        <button id="moreBtn" class="tool-btn" title="More">⋯</button>
      </div>
    </div>

    <!-- Quick Actions Panel -->
    <div id="actionsOverlay" class="actions-overlay">
      <div class="actions-panel">
        <button id="rotateBtn" class="action-btn">↻ Rotate 15°</button>
        <button id="mirrorHBtn" class="action-btn">↔ Mirror Horizontal</button>
        <button id="mirrorVBtn" class="action-btn">↕ Mirror Vertical</button>
        <button id="duplicateBtn" class="action-btn">⊕ Duplicate</button>
        <button id="groupBtn" class="action-btn">▣ Group Selected</button>
        <button id="deleteSelBtn" class="action-btn danger">✕ Delete Selected</button>
      </div>
    </div>
  </div>

  <!-- Menu Overlay -->
  <div id="menuOverlay" class="menu-overlay">
    <div class="menu-panel">
      <div class="menu-section">
        <div class="menu-section-title">Level Settings</div>
        <input type="text" id="levelName" class="menu-input" placeholder="Level Name">
        <select id="levelDifficulty" class="menu-select">
          <option value="1">Difficulty: 1 - Easy</option>
          <option value="2">Difficulty: 2 - Medium</option>
          <option value="3">Difficulty: 3 - Hard</option>
          <option value="4">Difficulty: 4 - Expert</option>
          <option value="5">Difficulty: 5 - Extreme</option>
        </select>
        <label class="menu-toggle-row">
          <span>Enable Yo-yo Thread</span>
          <input type="checkbox" id="yoyoThreadToggle">
        </label>
        <label class="menu-toggle-row">
          <span>Yo-yo Debug Drag (No Gravity)</span>
          <input type="checkbox" id="yoyoDebugDragToggle">
        </label>
        <button id="addToTrainingBtn" class="menu-btn primary">Add to Training</button>
      </div>

      <div class="menu-section">
        <div class="menu-section-title">Levels</div>
        <button id="newLevelBtn" class="menu-btn">+ New Level</button>
        <button id="levelListBtn" class="menu-btn">📋 Level List</button>
      </div>

      <div class="menu-section">
        <div class="menu-section-title">Settings</div>
        <button id="physicsBtn" class="menu-btn">⚙️ Physics Settings</button>
        <button id="clearBtn" class="menu-btn danger">🗑️ Clear All Pegs</button>
      </div>

      <div class="menu-section">
        <div class="menu-section-title">Import / Export</div>
        <button id="exportBtn" class="menu-btn">💾 Export Level</button>
        <button id="importBtn" class="menu-btn">📂 Import Level</button>
        <button id="exportTrainingBtn" class="menu-btn">📊 Export Training Data</button>
      </div>
    </div>
  </div>

  <!-- Level List Overlay -->
  <div id="levelListOverlay" class="level-list-overlay">
    <div class="level-list-header">
      <button id="closeLevelList" class="header-btn">←</button>
      <h2 class="level-list-title">Levels</h2>
      <div style="width: 36px;"></div>
    </div>
    <div class="level-list-content">
      <div id="levelItems"></div>
    </div>
  </div>

  <!-- Physics Settings Overlay -->
  <div id="physicsOverlay" class="physics-overlay">
    <div class="physics-panel">
      <div class="physics-header">
        <h2>Physics Settings</h2>
        <button id="closePhysicsPanel" class="header-btn">✕</button>
      </div>
      <div class="physics-content">
        <div class="slider-group">
          <label>Gravity: <span id="gravityValue">0.12</span></label>
          <input type="range" id="gravitySlider" min="1" max="50" value="12">
        </div>
        <div class="slider-group">
          <label>Bounce: <span id="bounceValue">0.65</span></label>
          <input type="range" id="bounceSlider" min="20" max="95" value="65">
        </div>
        <div class="slider-group">
          <label>Speed: <span id="speedValue">1.00</span></label>
          <input type="range" id="speedSlider" min="25" max="200" value="100">
        </div>
        <div class="slider-group">
          <label>Peg Size: <span id="sizeValue">10</span></label>
          <input type="range" id="sizeSlider" min="5" max="20" value="10">
        </div>
        <div class="slider-group">
          <label>Launch Power: <span id="powerValue">8.0</span></label>
          <input type="range" id="powerSlider" min="4" max="16" value="8" step="0.5">
        </div>
        <div class="toggle-group">
          <label>
            <input type="checkbox" id="trajectoryToggle">
            Show full trajectory (debug)
          </label>
        </div>
      </div>
    </div>
  </div>


  <script type="module" src="js/main.js"></script>
</body>
</html>
